name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release zip
        run: |
          zip -r yt-live-up-${{ github.ref_name }}.zip \
            manifest.json \
            dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: yt-live-up-${{ github.ref_name }}.zip
          generate_release_notes: true
